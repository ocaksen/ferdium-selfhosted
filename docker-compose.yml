services:
  ferdium:
    build: .
    environment:
      # Coolify'a "bu servisi 3000 portundan yayınla ve domain ver" der.
      - SERVICE_FQDN_FERDIUM_3000
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Istanbul
      # --- WEB GİRİŞ KORUMASI ---
      # Değerler GitHub'a yazılmaz; Coolify'ın Environment Variables bölümünden gelir.
      - CUSTOM_USER=${CUSTOM_USER}
      - PASSWORD=${PASSWORD}
    volumes:
      # Tüm hesap oturumların (WhatsApp QR vs.) burada kalıcı saklanır.
      - ferdium-config:/config
    expose:
      # KasmVNC web arayüzü bu portta; Coolify proxy buraya yönlendirir.
      - "3000"
    # Electron/Chromium'un düzgün çalışması için paylaşımlı bellek.
    shm_size: "1gb"
    restart: unless-stopped

volumes:
  ferdium-config:
